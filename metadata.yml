name: "Vorlesung Softwareentwicklung"
creativeWorkStatus: Published
description: >
  Vorlesung "Softwareentwicklung" der TU Bergakademie Freiberg. Vom
  Softwareentwicklungsprozess über die objektorientierte Programmierung mit C#
  und .NET (Sprachgrundlagen, Klassen, Vererbung, abstrakte Klassen und
  Interfaces, Generics und Container) bis zu Werkzeugen und Methoden der
  professionellen Softwareentwicklung: Versionsverwaltung mit Git,
  UML-Modellierung, Dokumentation und Build-Tools, Testen, Continuous
  Integration sowie fortgeschrittene Konzepte (Delegaten, Events, Threads und
  Tasks, LINQ, Entwurfsmuster und GUI-Entwicklung mit MAUI).

  Alle Materialien sind als interaktive LiaScript-Kurse aufbereitet. Die
  zentrale Uebersicht ist unter
  https://tubaf-ifi-liascript.github.io/VL_Softwareentwicklung/ abrufbar.

